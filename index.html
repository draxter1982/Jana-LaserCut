<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Prompt-to-Design Laser Cut</title>
    <style>
        :root {
            --primary: #28a745;
            --primary-hover: #218838;
            --secondary: #007bff;
            --secondary-hover: #0056b3;
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-main: #333333;
            --border-color: #cccccc;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }
        
        .container { 
            width: 100%;
            max-width: 800px; 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.05); 
        }

        h2 { margin-top: 0; color: #111; }
        .subtitle { color: #666; margin-bottom: 20px; font-size: 0.95em; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #444; }

        select, textarea { 
            width: 100%; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid var(--border-color); 
            font-family: inherit; 
            font-size: 15px;
            box-sizing: border-box;
            background-color: #fff;
        }

        textarea { height: 100px; resize: vertical; }
        textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(40, 167, 69, 0.2);
        }

        #customGemContainer { display: none; margin-top: 10px; }
        #customGemInput { background-color: #fdfdfd; border-style: dashed; }

        button { 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            cursor: pointer; 
            border-radius: 6px; 
            font-weight: 600; 
            font-size: 16px;
            transition: background-color 0.2s ease;
            margin-right: 10px; 
        }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #a5d8b1; cursor: not-allowed; }
        
        #downloadBtn { 
            background-color: var(--secondary); 
            display: none; 
            margin-top: 20px; 
            width: 100%;
        }
        #downloadBtn:hover { background-color: var(--secondary-hover); }
        
        /* Ruangan Preview dan Slider */
        #preview-container { 
            margin-top: 25px; 
            border: 2px dashed var(--border-color); 
            border-radius: 8px;
            padding: 20px; 
            background: #fafafa; 
            text-align: center; 
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        #preview { width: 100%; }
        #preview svg { 
            max-width: 100%; 
            height: auto; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            background-color: white;
        } 
        
        .loader { 
            display: none; 
            font-style: italic; 
            color: var(--secondary); 
            margin-top: 15px;
            font-weight: bold;
        }

        .error-msg {
            display: none;
            color: #dc3545;
            background-color: #f8d7da;
            padding: 10px;
            border-radius: 6px;
            margin-top: 15px;
            font-weight: 500;
            white-space: pre-wrap;
        }
        
        /* Gaya untuk Slider */
        #sizeControls { 
            display: none; 
            margin-top: 25px; 
            padding: 20px; 
            background: #f8f9fa; 
            border-radius: 8px; 
            border: 1px solid #e9ecef;
        }
        .slider { width: 100%; margin: 15px 0; cursor: pointer; }
        .size-display { 
            font-size: 1.1em; 
            font-weight: 600; 
            color: #444; 
            text-align: center;
            background: white;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        .gem-badge {
            display: inline-block;
            background: #6f42c1;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-bottom: 10px;
        }

        @media (max-width: 600px) {
            button { width: 100%; margin-bottom: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistem Penjana SVG Laser Cut</h2>
    <p class="subtitle">Pilih kepakaran AI (Gem) dan masukkan deskripsi rekaan anda.</p>
    
    <!-- Bahagian Pemilihan Gem -->
    <div class="form-group">
        <label for="gemSelector"><span class="gem-badge">✨ Profil Gem</span> Pilih Pakar Rekaan:</label>
        <select id="gemSelector" onchange="toggleCustomGem()">
            <option value="asas">Gem Asas (Pakar Vektor Umum)</option>
            <option value="kotak">Gem Pakar Kotak & Cantuman (Tab/Slot)</option>
            <option value="aksesori">Gem Pakar Aksesori (Keychain/Subang)</option>
            <option value="custom">🛠️ Cipta Gem Sendiri (Custom Prompt)</option>
        </select>
        
        <div id="customGemContainer">
            <textarea id="customGemInput" placeholder="Masukkan arahan (System Instruction) khas untuk Gem anda di sini. Contoh: 'Anda adalah pakar pembuat stensil. Pastikan semua huruf bersambung...'"></textarea>
        </div>
    </div>

    <!-- Bahagian Input Pengguna -->
    <div class="form-group">
        <label for="promptInput">Deskripsi Rekaan (Prompt):</label>
        <textarea id="promptInput" placeholder="Contoh: Hasilkan rekaan piala bola sepak. Asingkan tapak dan badan piala untuk dicantum secara 'flat-pack'."></textarea>
    </div>
    
    <button id="generateBtn" onclick="generateDesign()">Jana Rekaan SVG</button>

    <div class="loader" id="loadingText">⏳ Gem sedang menjana kod vektor. Sila tunggu...</div>
    <div class="error-msg" id="errorText"></div>
    
    <div id="sizeControls">
        <label for="sizeSlider"><b>Laras Saiz Lebar Fizikal (cm):</b></label>
        <input type="range" id="sizeSlider" class="slider" min="2" max="60" value="10" step="0.5" oninput="updateSize()">
        <div class="size-display" id="sizeDisplay">Lebar: 10 cm | Tinggi: -- cm</div>
        <button id="downloadBtn" onclick="downloadSVG()">Muat Turun Fail SVG (.svg)</button>
    </div>

    <div id="preview-container">
        <div id="preview">
            <p style="color:#888;">Pratonton (Preview) rekaan akan dipaparkan di sini.</p>
        </div>
    </div>
</div>

<script>
    const apiKey = "AIzaSyDbPUmDhbMTtVbU0NKAFMd5uB6sQCyJn1U"; 
    let aspectRatio = 1; 

    const baseInstruction = `
    Hasilkan KOD SVG SAHAJA tanpa sebarang teks markdown (seperti \`\`\`svg). 
    Mesti guna tag <g>. Susun bahagian secara 'flat-pack'. 
    Mesti ada viewBox. 
    Garisan Potong: stroke="#FF0000" stroke-width="2" fill="none". 
    Garisan Ukir: fill="#000000" atau stroke="#000000". 
    Tiada kotak background. Mula dgn <svg> dan tamat dgn </svg>.`;

    const gemsProfiles = {
        asas: "Anda adalah pakar pembuat fail vektor SVG umum untuk mesin pemotong laser (laser cut). Hasilkan rekaan yang ringkas dan mudah dipotong.",
        kotak: "Anda adalah pakar jurutera reka bentuk pembungkusan dan kayu. Anda pakar menghasilkan rekaan kotak dan struktur 3D menggunakan teknik cantuman (tab and slot / kerf bending). Pastikan setiap rekaan mempunyai lubang slot dan gigi cantuman (tabs) yang sepadan untuk dipasang secara flat-pack.",
        aksesori: "Anda adalah pakar pereka perhiasan dan aksesori (keychain, anting-anting, rantai). Anda pakar merancang rekaan bersaiz kecil yang kukuh. Pastikan SETIAP rekaan yang diminta mempunyai satu lubang kecil (hole) di bahagian atas berukuran sekurang-kurangnya 3mm radius untuk dimasukkan cincin besi (jump ring)."
    };

    function toggleCustomGem() {
        const selector = document.getElementById('gemSelector').value;
        const customContainer = document.getElementById('customGemContainer');
        customContainer.style.display = selector === 'custom' ? 'block' : 'none';
    }

    async function fetchWithRetry(url, options, maxRetries = 5) {
        const delays = [1000, 2000, 4000, 8000, 16000];
        for (let i = 0; i < maxRetries; i++) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) {
                    const errorData = await response.text();
                    throw new Error(`Ralat Pelayan: ${response.status}\nButiran: ${errorData}`);
                }
                return await response.json();
            } catch (error) {
                if (i === maxRetries - 1) throw error;
                await new Promise(res => setTimeout(res, delays[i]));
            }
        }
    }

    async function generateDesign() {
        const userPrompt = document.getElementById('promptInput').value.trim();
        const errorText = document.getElementById('errorText');
        
        if(!userPrompt) { 
            showError('Sila masukkan deskripsi rekaan (prompt) terlebih dahulu!'); 
            return; 
        }

        const gemSelection = document.getElementById('gemSelector').value;
        let specificGemInstruction = "";
        
        if (gemSelection === 'custom') {
            specificGemInstruction = document.getElementById('customGemInput').value.trim();
            if (!specificGemInstruction) {
                showError('Sila masukkan arahan untuk Custom Gem anda.');
                return;
            }
        } else {
            specificGemInstruction = gemsProfiles[gemSelection];
        }

        const finalSystemInstruction = specificGemInstruction + "\n\nARAHAN WAJIB FORMAT:\n" + baseInstruction;

        document.getElementById('loadingText').style.display = 'block';
        document.getElementById('generateBtn').disabled = true;
        errorText.style.display = 'none';
        document.getElementById('preview').innerHTML = '<p style="color:#888;">Gem sedang memikirkan rekaan...</p>';
        document.getElementById('sizeControls').style.display = 'none';

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        
        const payload = {
            contents: [{ parts: [{ text: userPrompt }] }],
            systemInstruction: { parts: [{ text: finalSystemInstruction }] }
        };

        try {
            const data = await fetchWithRetry(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!data.candidates || data.candidates.length === 0) throw new Error("Tiada respons dari AI.");

            let rawText = data.candidates[0].content.parts[0].text;
            let generatedSVGCode = rawText.replace(/```svg/gi, '').replace(/```html/gi, '').replace(/```/g, '').trim();

            document.getElementById('preview').innerHTML = generatedSVGCode;
            
            const svgElement = document.querySelector('#preview svg');
            if(svgElement) {
                svgElement.style.width = '100%';
                svgElement.style.height = 'auto';

                let viewBox = svgElement.getAttribute('viewBox');
                if (viewBox) {
                    let parts = viewBox.split(/[\s,]+/).map(Number);
                    if(parts.length === 4 && parts[3] > 0) {
                        aspectRatio = parts[2] / parts[3]; 
                    }
                } else {
                    let w = parseFloat(svgElement.getAttribute('width')) || 100;
                    let h = parseFloat(svgElement.getAttribute('height')) || 100;
                    aspectRatio = w / h;
                    svgElement.setAttribute('viewBox', `0 0 ${w} ${h}`);
                }
                
                document.getElementById('sizeControls').style.display = 'block';
                document.getElementById('downloadBtn').style.display = 'block';
                document.getElementById('sizeSlider').value = 10; 
                updateSize(); 
            } else {
                throw new Error("Kod yang dijana bukan format SVG yang sah.\n\nRespons asal:\n" + rawText.substring(0, 100) + "...");
            }

        } catch (error) {
            console.error('Ralat Penuh:', error);
            let userFriendlyMessage = "Masalah sambungan atau format: " + error.message;
            if (error.message.includes('403')) {
                userFriendlyMessage = "Akses API ditolak (Ralat 403). Sila cuba sebentar lagi atau pastikan anda disambung ke rangkaian yang dibenarkan.";
            } else if (error.message.includes('429')) {
                userFriendlyMessage = "Terlalu banyak permintaan (Ralat 429). Sistem sedang sibuk. Sila cuba lagi dalam beberapa minit.";
            } else if (error.message.includes('400')) {
                userFriendlyMessage = "Ralat permintaan (Ralat 400). Sila semak semula input anda atau format pelayan mungkin telah berubah.";
            }
            
            showError('Gagal menjana rekaan.\n' + userFriendlyMessage);
            document.getElementById('preview').innerHTML = '<p style="color:#888;">Sila cuba lagi.</p>';
        } finally {
            document.getElementById('loadingText').style.display = 'none';
            document.getElementById('generateBtn').disabled = false;
        }
    }

    function showError(msg) {
        const errorText = document.getElementById('errorText');
        errorText.innerText = msg;
        errorText.style.display = 'block';
    }

    function updateSize() {
        const sliderVal = document.getElementById('sizeSlider').value;
        const widthCm = parseFloat(sliderVal);
        const heightCm = (widthCm / aspectRatio).toFixed(2); 

        document.getElementById('sizeDisplay').innerHTML = `Lebar (Width): <b>${widthCm} cm</b> &nbsp;|&nbsp; Tinggi (Height): <b>${heightCm} cm</b>`;

        const svgElement = document.querySelector('#preview svg');
        if (svgElement) {
            svgElement.setAttribute('width', `${widthCm}cm`);
            svgElement.setAttribute('height', `${heightCm}cm`);
        }
    }

    function downloadSVG() {
        const svgElement = document.querySelector('#preview svg');
        if(!svgElement) return;

        const cloneSVG = svgElement.cloneNode(true);
        
        cloneSVG.style.width = '';
        cloneSVG.style.height = '';
        
        const sliderVal = document.getElementById('sizeSlider').value;
        const widthCm = parseFloat(sliderVal);
        const heightCm = (widthCm / aspectRatio).toFixed(2); 

        cloneSVG.setAttribute('width', `${widthCm}cm`);
        cloneSVG.setAttribute('height', `${heightCm}cm`);

        const serializer = new XMLSerializer();
        let finalSVGCode = serializer.serializeToString(cloneSVG);
        
        if (!finalSVGCode.includes('xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)"')) {
            finalSVGCode = finalSVGCode.replace('<svg ', '<svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" ');
        }

        const blob = new Blob([finalSVGCode], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'rekaan_lasercut.svg';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
